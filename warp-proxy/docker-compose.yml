services:
  warp:
    image: caomingjun/warp
    container_name: warp-proxy
    restart: unless-stopped
    # add removed rule back (https://github.com/opencontainers/runc/pull/3468)
    device_cgroup_rules:
      - 'c 10:200 rwm'
    ports:
      - "127.0.0.1:10800:1080"  # SOCKS5 proxy - localhost only (secure)
    environment:
      - WARP_SLEEP=2
      - GOST_ARGS=-L socks5://${WARP_PROXY_USER}:${WARP_PROXY_PASS}@:1080
      # - WARP_LICENSE_KEY=  # Optional: WARP+ license key
    cap_add:
      # Docker already has them, these are for podman users
      - MKNOD
      - AUDIT_WRITE
      # additional required cap for warp
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./data:/var/lib/cloudflare-warp
